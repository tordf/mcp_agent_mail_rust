name: dist

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  lint:
    runs-on: ubuntu-latest
    # Lint failures are reported but do not block the release build.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Clone sibling dependencies
        run: |
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensearch ../frankensearch
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync ../asupersync
          git clone --depth 1 https://github.com/Dicklesworthstone/sqlmodel_rust ../sqlmodel_rust
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite ../frankensqlite
          git clone --depth 1 https://github.com/Dicklesworthstone/frankentui ../frankentui
          git clone --depth 1 https://github.com/Dicklesworthstone/beads_rust ../beads_rust

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone sibling dependencies
        run: |
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensearch ../frankensearch
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync ../asupersync
          git clone --depth 1 https://github.com/Dicklesworthstone/sqlmodel_rust ../sqlmodel_rust
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite ../frankensqlite
          git clone --depth 1 https://github.com/Dicklesworthstone/frankentui ../frankentui
          git clone --depth 1 https://github.com/Dicklesworthstone/beads_rust ../beads_rust

      - uses: dtolnay/rust-toolchain@nightly

      - name: Run tests
        run: cargo test --lib

  build:
    needs: test
    # Test failures should not block release builds — tests use nightly
    # Rust and may fail due to toolchain instability.
    if: always() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # x86_64-apple-darwin removed: ort-sys lacks prebuilt ONNX
          # Runtime binaries for this target.  v0.2.20 never shipped it.
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone sibling dependencies
        run: |
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensearch ../frankensearch
          git clone --depth 1 https://github.com/Dicklesworthstone/asupersync ../asupersync
          git clone --depth 1 https://github.com/Dicklesworthstone/sqlmodel_rust ../sqlmodel_rust
          git clone --depth 1 https://github.com/Dicklesworthstone/frankensqlite ../frankensqlite
          git clone --depth 1 https://github.com/Dicklesworthstone/frankentui ../frankentui
          git clone --depth 1 https://github.com/Dicklesworthstone/beads_rust ../beads_rust

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        # --no-default-features --features portable: exclude hybrid/fastembed
        # (ONNX Runtime ships AVX2-only static libs → SIGILL on older x86 CPUs).
        # Portable keeps s3fifo + tantivy-engine; hybrid can still be enabled
        # by users who build from source with default features.
        run: |
          cargo build --release --target ${{ matrix.target }} -p mcp-agent-mail -p mcp-agent-mail-cli --no-default-features --features portable

      - name: Create tarball (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist staging
          TARBALL="mcp-agent-mail-${{ matrix.target }}.tar.xz"
          # Copy raw binaries into a flat staging dir to guarantee no nested archives
          cp "target/${{ matrix.target }}/release/mcp-agent-mail" staging/
          cp "target/${{ matrix.target }}/release/am" staging/
          # Verify the files are ELF/Mach-O binaries, not archives
          for f in staging/mcp-agent-mail staging/am; do
            mime=$(file --brief --mime-type "$f")
            case "$mime" in
              application/x-executable|application/x-mach-binary|application/x-pie-executable|application/x-sharedlib) ;;
              *) echo "ERROR: $f has unexpected type '$mime' — refusing to package" >&2; exit 1 ;;
            esac
          done
          # Surface verification: fail fast if binaries are swapped/mispackaged.
          staging/am --help > staging/am.help.txt
          staging/mcp-agent-mail --help > staging/mcp-agent-mail.help.txt
          grep -qE '(^|[[:space:]])serve-http([[:space:]]|$)' staging/am.help.txt || {
            echo "ERROR: staging/am missing expected CLI command surface" >&2
            exit 1
          }
          grep -qE '^Usage: mcp-agent-mail ' staging/mcp-agent-mail.help.txt || {
            echo "ERROR: staging/mcp-agent-mail has unexpected usage header" >&2
            exit 1
          }
          grep -qE '(^|[[:space:]])serve([[:space:]]|$)' staging/mcp-agent-mail.help.txt || {
            echo "ERROR: staging/mcp-agent-mail missing expected server command surface" >&2
            exit 1
          }
          tar -cJf "dist/$TARBALL" -C staging mcp-agent-mail am
          cd dist
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipName = "mcp-agent-mail-${{ matrix.target }}.zip"
          $cliHelp = & "target/${{ matrix.target }}/release/am.exe" --help | Out-String
          if ($cliHelp -notmatch '(^|\s)serve-http(\s|$)') {
            throw "target/${{ matrix.target }}/release/am.exe missing expected CLI command surface"
          }
          $serverHelp = & "target/${{ matrix.target }}/release/mcp-agent-mail.exe" --help | Out-String
          if ($serverHelp -notmatch 'Usage:\s+mcp-agent-mail') {
            throw "target/${{ matrix.target }}/release/mcp-agent-mail.exe has unexpected usage header"
          }
          if ($serverHelp -notmatch '(^|\s)serve(\s|$)') {
            throw "target/${{ matrix.target }}/release/mcp-agent-mail.exe missing expected server command surface"
          }
          Compress-Archive -Path "target/${{ matrix.target }}/release/mcp-agent-mail.exe","target/${{ matrix.target }}/release/am.exe" -DestinationPath "dist/$zipName"
          cd dist
          $hash = (Get-FileHash -Algorithm SHA256 $zipName).Hash.ToLower()
          "$hash  $zipName" | Out-File -Encoding ASCII "$zipName.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: build
    # Run when all build matrix entries succeed, even if test/lint failed
    # (build already gates on !cancelled via its own `if`).
    if: always() && !cancelled() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -laR dist

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.0.0

      - name: Sign release artifacts (sigstore bundle)
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          for f in mcp-agent-mail-*.tar.xz mcp-agent-mail-*.zip; do
            cosign sign-blob --yes --bundle "${f}.sigstore.json" "$f"
          done

      - name: Generate consolidated SHA256SUMS
        run: |
          cd dist
          shasum -a 256 mcp-agent-mail-*.tar.xz mcp-agent-mail-*.zip 2>/dev/null > SHA256SUMS || true
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Validate release bundle completeness
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          archives=(mcp-agent-mail-*.tar.xz mcp-agent-mail-*.zip)
          if [ "${#archives[@]}" -eq 0 ]; then
            echo "No release archives found in dist/" >&2
            exit 1
          fi
          test -s SHA256SUMS
          for artifact in "${archives[@]}"; do
            test -s "$artifact"
            test -s "${artifact}.sha256"
            test -s "${artifact}.sigstore.json"
            sidecar_hash="$(awk '{print $1; exit}' "${artifact}.sha256")"
            sums_hash="$(awk -v artifact="$artifact" '$2 == artifact || $2 == ("./" artifact) || $2 == ("*" artifact) {print $1; exit}' SHA256SUMS)"
            if [ -z "$sums_hash" ]; then
              echo "SHA256SUMS missing entry for ${artifact}" >&2
              exit 1
            fi
            if [ "$sidecar_hash" != "$sums_hash" ]; then
              echo "Checksum mismatch between ${artifact}.sha256 and SHA256SUMS for ${artifact}" >&2
              exit 1
            fi
          done

      - name: Copy install scripts to dist
        run: |
          cp install.sh dist/ 2>/dev/null || echo "No install.sh found"
          cp install.ps1 dist/ 2>/dev/null || echo "No install.ps1 found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
